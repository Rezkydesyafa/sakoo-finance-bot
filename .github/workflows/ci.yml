name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      TELEGRAM_BOT_TOKEN: "123456:test-token"
      TELEGRAM_WEBHOOK_SECRET: test-telegram-secret
      WAHA_SESSION_NAME: default
      STORAGE_PATH: ../storage
      MEDIA_RECEIPT_MAX_BYTES: 5242880
      OCR_DAILY_LIMIT_PER_USER: 20
      OCR_RATE_LIMIT_TIMEZONE: Asia/Jakarta
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend Node.js 20
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Test frontend
        run: npm test --if-present

      - name: Build frontend
        run: npm run build --if-present

  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name prefix
        run: echo "IMAGE_PREFIX=ghcr.io/${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sakoo-backend:latest
            ${{ env.IMAGE_PREFIX }}/sakoo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sakoo-frontend:latest
            ${{ env.IMAGE_PREFIX }}/sakoo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

