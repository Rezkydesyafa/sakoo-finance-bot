name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      TELEGRAM_BOT_TOKEN: "123456:test-token"
      TELEGRAM_WEBHOOK_SECRET: test-telegram-secret
      WAHA_SESSION_NAME: default
      STORAGE_PATH: ../storage
      MEDIA_RECEIPT_MAX_BYTES: 5242880
      OCR_DAILY_LIMIT_PER_USER: 20
      OCR_RATE_LIMIT_TIMEZONE: Asia/Jakarta
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend Node.js 20
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Test frontend
        run: npm test --if-present

      - name: Build frontend
        run: npm run build --if-present
