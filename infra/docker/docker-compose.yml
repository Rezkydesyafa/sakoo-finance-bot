services:
  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY is required}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
      WAHA_TIMEOUT_SECONDS: ${WAHA_TIMEOUT_SECONDS:-10}
      WAHA_WEBHOOK_HMAC_KEY: ${WAHA_WEBHOOK_HMAC_KEY:-}
      STORAGE_PATH: /app/storage
    volumes:
      - ../../storage:/app/storage
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../../frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    depends_on:
      - backend
    ports:
      - "3001:3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ../../backend
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1}
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY is required}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
      WAHA_TIMEOUT_SECONDS: ${WAHA_TIMEOUT_SECONDS:-10}
      STORAGE_PATH: /app/storage
    volumes:
      - ../../storage:/app/storage
    depends_on:
      - postgres
      - redis

  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY is required}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:?WAHA_DASHBOARD_USERNAME is required}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:?WAHA_DASHBOARD_PASSWORD is required}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
      WHATSAPP_HOOK_URL: ${WAHA_WEBHOOK_URL:-http://backend:8000/webhook/waha}
      WHATSAPP_HOOK_EVENTS: ${WAHA_WEBHOOK_EVENTS:-message}
      WHATSAPP_HOOK_HMAC_KEY: ${WAHA_WEBHOOK_HMAC_KEY:-}
    volumes:
      - waha_sessions:/app/.sessions
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  waha_sessions:
