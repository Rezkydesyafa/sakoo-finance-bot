<body class="bg-surface min-h-screen flex flex-col relative font-body-main text-body-main text-text-primary overflow-x-hidden">
<!-- Atmospheric Glow Background -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-0 left-0 w-[600px] h-[600px] bg-glow-blue rounded-full mix-blend-multiply filter blur-[120px] opacity-70 transform -translate-x-1/4 -translate-y-1/4"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-glow-pink rounded-full mix-blend-multiply filter blur-[120px] opacity-60 transform translate-x-1/4 translate-y-1/4"></div>
<div class="absolute top-1/2 left-1/2 w-[800px] h-[400px] bg-glow-purple rounded-full mix-blend-multiply filter blur-[150px] opacity-50 transform -translate-x-1/2 -translate-y-1/2"></div>
</div>
<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-md sticky top-0 full-width bg-transparent z-50">
<div class="flex justify-between items-center w-full px-outer-margin py-stack-md max-w-container-max mx-auto">
<div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">
                    finance_chip
                </span>
<h1 class="font-headline-section text-headline-section font-bold text-primary tracking-tight">
                    Sakoo Finance
                </h1>
</div>
<div class="flex items-center">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center p-2 rounded-full text-secondary hover:bg-surface-muted transition-colors">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center p-outer-margin relative z-10 w-full max-w-container-max mx-auto">
<!-- Login Hero Card -->
<div class="bg-surface-white w-full max-w-[480px] p-card-padding sm:p-10 relative overflow-hidden transition-all duration-300 hover:-translate-y-1 group" style="border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.06);">
<!-- Card Content -->
<div class="relative z-10 flex flex-col items-center w-full">
<!-- Logo & Greeting -->
<div class="flex justify-center mb-6">
<div class="w-16 h-16 bg-surface-muted rounded-full flex items-center justify-center text-primary group-hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">
                            robot_2
                        </span>
</div>
</div>
<h2 class="font-headline-hero text-headline-hero text-center text-inverse-surface mb-2">
                    Welcome Back
                </h2>
<p class="font-body-main text-body-main text-text-muted text-center mb-8 px-4">
                    Log in to manage your smart financial assistant.
                </p>
<!-- Form -->
<form class="w-full flex flex-col gap-4">
<!-- Email Field -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-muted rounded-full py-4 pl-12 pr-6 font-body-main text-body-main text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-1 focus:ring-primary-container focus:bg-surface-white transition-all border-none shadow-none" placeholder="Email address" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-muted rounded-full py-4 pl-12 pr-12 font-body-main text-body-main text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-1 focus:ring-primary-container focus:bg-surface-white transition-all border-none shadow-none" placeholder="Password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-text-muted hover:text-text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full px-2 mt-1 mb-2">
<a class="font-label-button text-label-button text-text-muted hover:text-primary transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-text-primary rounded-full py-4 font-label-button text-label-button flex items-center justify-center gap-2 hover:-translate-y-1 hover:shadow-[0_12px_24px_rgba(199,255,0,0.25)] transition-all duration-300" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-px bg-border-light flex-grow"></div>
<span class="font-label-muted text-label-muted text-text-muted">Or continue with</span>
<div class="h-px bg-border-light flex-grow"></div>
</div>
<!-- Social Logins -->
<div class="w-full flex flex-col sm:flex-row gap-3">
<button class="flex-1 bg-surface-muted text-text-primary rounded-full py-3 px-6 font-label-button text-label-button flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors border border-transparent" type="button">
<span class="material-symbols-outlined text-[18px]">account_circle</span>
                        Google
                    </button>
<button class="flex-1 bg-surface-muted text-text-primary rounded-full py-3 px-6 font-label-button text-label-button flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors border border-transparent" type="button">
<span class="material-symbols-outlined text-[18px]">apps</span>
                        Apple
                    </button>
</div>
<!-- Sign Up Link -->
<div class="mt-8 text-center w-full">
<span class="font-body-main text-body-main text-text-muted">Don't have an account?</span>
<a class="font-label-button text-label-button text-primary hover:underline ml-1" href="#">
                        Sign Up
                    </a>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-transparent w-full z-10 relative mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-outer-margin py-stack-lg gap-stack-md max-w-container-max mx-auto">
<!-- Copyright -->
<div class="font-label-muted text-label-muted text-text-muted text-center md:text-left">
                © 2024 Sakoo Finance Bot. Securely encrypted.
            </div>
<!-- Links -->
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-muted text-label-muted text-text-muted hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    Privacy Policy
                </a>
<a class="font-label-muted text-label-muted text-text-muted hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    Terms of Service
                </a>
<a class="font-label-muted text-label-muted text-text-muted hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    Security
                </a>
</div>
<!-- Brand Mark Small -->
<div class="font-label-button text-label-button text-text-primary opacity-50 flex items-center gap-1 mt-4 md:mt-0">
<span class="material-symbols-outlined text-[16px]">finance_chip</span>
                Sakoo
            </div>
</div>
</footer>
</body></html>
